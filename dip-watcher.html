/* =========================
   CALCULATE DIP SCORE (IMPROVED)
========================= */
const calculateDipScore = (asset) => {
    let score = 0;

    // Price momentum is primary indicator (0-40 points)
    if (asset.priceChange24h < -10) score += 40;
    else if (asset.priceChange24h < -8) score += 35;
    else if (asset.priceChange24h < -6) score += 30;
    else if (asset.priceChange24h < -4) score += 25;
    else if (asset.priceChange24h < -2) score += 18;
    else if (asset.priceChange24h < 0) score += 10;
    else if (asset.priceChange24h < 2) score += 5;

    // RSI Signal (0-30 points)
    if (asset.rsi < 20) score += 30;
    else if (asset.rsi < 25) score += 25;
    else if (asset.rsi < 30) score += 20;
    else if (asset.rsi < 35) score += 15;
    else if (asset.rsi < 40) score += 10;
    else if (asset.rsi > 70) score -= 10;

    // Volume surge (0-20 points)
    if (asset.volumeMA20Day > 0) {
        const volumeRatio = asset.volume24h / asset.volumeMA20Day;
        if (volumeRatio > 2.5) score += 20;
        else if (volumeRatio > 2.0) score += 18;
        else if (volumeRatio > 1.8) score += 16;
        else if (volumeRatio > 1.5) score += 12;
        else if (volumeRatio > 1.2) score += 8;
        else if (volumeRatio > 1.0) score += 3;
    }

    // Valuation bonus (0-10 points)
    if (asset.pe && asset.pe > 0) {
        if (asset.pe < 12) score += 10;
        else if (asset.pe < 15) score += 8;
        else if (asset.pe < 18) score += 6;
        else if (asset.pe < 22) score += 4;
        else if (asset.pe > 40) score -= 5;
    }

    return Math.max(0, Math.min(100, score));
};

/* =========================
   FETCH STOCK DATA (YAHOO FINANCE - FREE, NO API KEY!)
========================= */
const fetchStockData = async (symbol) => {
    try {
        const response = await fetch(
            `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${symbol}?modules=price,defaultKeyStatistics`
        );

        const data = await response.json();

        if (!data.quoteSummary?.result?.[0]) {
            console.warn(`No data for ${symbol}`);
            return null;
        }

        const result = data.quoteSummary.result[0];
        const priceData = result.price;

        if (!priceData?.regularMarketPrice?.raw) {
            return null;
        }

        const currentPrice = priceData.regularMarketPrice.raw;
        const previousClose = priceData.regularMarketPreviousClose?.raw || currentPrice;
        
        if (!previousClose || previousClose === 0) {
            return null;
        }

        const change24h = ((currentPrice - previousClose) / previousClose) * 100;

        // Estimate RSI based on price change
        let rsi = 50;
        if (change24h < -10) rsi = 20;
        else if (change24h < -8) rsi = 25;
        else if (change24h < -6) rsi = 30;
        else if (change24h < -4) rsi = 35;
        else if (change24h < -2) rsi = 40;
        else if (change24h < 0) rsi = 45;
        else if (change24h < 2) rsi = 55;
        else if (change24h < 4) rsi = 60;
        else if (change24h > 10) rsi = 80;

        return {
            id: symbol,
            symbol,
            name: symbol,
            type: "stock",
            currentPrice,
            priceChange24h: change24h,
            volume24h: priceData.regularMarketVolume?.raw || 0,
            volumeMA20Day: Math.max((priceData.regularMarketVolume?.raw || 0) * 0.85, 1),
            rsi,
            ma200Day: null,
            pe: result.defaultKeyStatistics?.trailingPE?.raw || null,
            dividendYield: (result.defaultKeyStatistics?.trailingAnnualDividendYield?.raw || 0) * 100,
            price52WkHigh: priceData.fiftyTwoWeekHigh?.raw || currentPrice,
            price52WkLow: priceData.fiftyTwoWeekLow?.raw || currentPrice,
            fetchedAt: new Date()
        };
    } catch (e) {
        console.error(`Error fetching ${symbol}:`, e.message);
        return null;
    }
};

/* =========================
   FETCH CRYPTO DATA (COINGECKO - FREE!)
========================= */
const fetchCryptoData = async (coinId) => {
    try {
        const response = await fetch(
            `https://api.coingecko.com/api/v3/coins/${coinId}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false`
        );

        const data = await response.json();

        if (!data.market_data) {
            return null;
        }

        const marketData = data.market_data;
        const currentPrice = marketData.current_price?.usd || 0;
        const priceChange24h = marketData.price_change_percentage_24h || 0;

        let rsi = 50;
        if (priceChange24h < -8) rsi = 20;
        else if (priceChange24h < -6) rsi = 25;
        else if (priceChange24h < -4) rsi = 30;
        else if (priceChange24h < -2) rsi = 35;
        else if (priceChange24h > 8) rsi = 80;

        return {
            id: data.symbol?.toUpperCase() || coinId.toUpperCase(),
            symbol: data.symbol?.toUpperCase() || coinId.toUpperCase(),
            name: data.name,
            type: "crypto",
            currentPrice,
            priceChange24h,
            volume24h: marketData.total_volume?.usd || 0,
            volumeMA20Day: (marketData.total_volume?.usd || 0) * 0.8,
            rsi,
            ma200Day: null,
            pe: null,
            dividendYield: 0,
            price52WkHigh: marketData.ath?.usd || currentPrice,
            price52WkLow: marketData.atl?.usd || currentPrice,
            fetchedAt: new Date()
        };
    } catch (e) {
        console.error(`Error fetching ${coinId}:`, e.message);
        return null;
    }
};

/* =========================
   MAIN APP
========================= */
function DipBuyDashboard() {
    const [assets, setAssets] = useState([]);
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState("");
    const [lastUpdate, setLastUpdate] = useState(null);
    const [sortConfig, setSortConfig] = useState({ key: 'dipScore', direction: 'desc' });
    const [filterType, setFilterType] = useState('all');
    const [customTickers, setCustomTickers] = useState([]);
    const [newTickerInput, setNewTickerInput] = useState("");
    const [newTickerName, setNewTickerName] = useState("");
    const [newTickerType, setNewTickerType] = useState("stock");

    // Load cached data on mount
    useEffect(() => {
        const cached = localStorage.getItem('dipbuy_cache');
        if (cached) {
            try {
                const { assets: cachedAssets, timestamp } = JSON.parse(cached);
                setAssets(cachedAssets);
                setLastUpdate(new Date(timestamp));
            } catch (err) {
                console.error('Cache load error:', err);
            }
        }
    }, []);

    const handleAddTicker = () => {
        if (!newTickerInput.trim()) return;
        
        const ticker = newTickerInput.trim().toUpperCase();
        
        if (customTickers.some(t => t.symbol === ticker)) {
            alert(`${ticker} is already being tracked!`);
            setNewTickerInput("");
            return;
        }
        
        const newTicker = {
            symbol: ticker,
            type: newTickerType,
            readableName: newTickerName.trim() || NAMES[ticker] || ticker
        };
        
        setCustomTickers([...customTickers, newTicker]);
        setNewTickerInput("");
        setNewTickerName("");
    };

    const handleRemoveTicker = (symbol) => {
        setCustomTickers(customTickers.filter(t => t.symbol !== symbol));
    };

    const handleUpdate = async () => {
        setLoading(true);
        setProgress("");
        const allAssets = [];
        let failed = [];

        const customNameMap = {};
        customTickers.forEach(t => {
            customNameMap[t.symbol] = t.readableName;
        });

        const allSymbols = [
            ...SYMBOLS.indexes.map(s => ({ symbol: s, type: 'index' })),
            ...SYMBOLS.stocks.map(s => ({ symbol: s, type: 'stock' })),
            ...SYMBOLS.etfs.map(s => ({ symbol: s, type: 'etf' })),
            ...SYMBOLS.commodities.map(s => ({ symbol: s, type: 'commodity' })),
            ...SYMBOLS.leveraged.map(s => ({ symbol: s, type: 'leveraged' })),
            ...SYMBOLS.crypto.map(s => ({ symbol: s, type: 'crypto' })),
            ...customTickers.map(s => ({ symbol: s.symbol, type: s.type }))
        ];

        let current = 0;
        const total = allSymbols.length;

        // Fetch stocks, ETFs, and indexes
        for (const item of allSymbols.filter(x => x.type !== 'crypto')) {
            setProgress(`Fetching... (${current + 1}/${total}) ${item.symbol}`);
            const data = await fetchStockData(item.symbol);
            if (data) {
                data.type = item.type;
                data.readableName = customNameMap[item.symbol] || NAMES[item.symbol] || item.symbol;
                allAssets.push(data);
            } else {
                failed.push(item.symbol);
            }
            current++;
            await new Promise(resolve => setTimeout(resolve, 200));
        }

        // Fetch crypto
        for (const item of allSymbols.filter(x => x.type === 'crypto')) {
            setProgress(`Fetching... (${current + 1}/${total}) ${item.symbol}`);
            const data = await fetchCryptoData(item.symbol);
            if (data) {
                data.readableName = customNameMap[item.symbol] || NAMES[item.symbol] || data.name;
                allAssets.push(data);
            } else {
                failed.push(item.symbol);
            }
            current++;
            await new Promise(resolve => setTimeout(resolve, 100));
        }

        if (allAssets.length > 0) {
            setAssets(allAssets);
            setLastUpdate(new Date());
            localStorage.setItem('dipbuy_cache', JSON.stringify({ assets: allAssets, timestamp: new Date().toISOString() }));
        }

        setLoading(false);
        let msg = `✅ Updated ${allAssets.length}/${total} assets`;
        if (failed.length > 0) {
            msg += ` (Failed: ${failed.join(", ")})`;
        }
        setProgress(msg);
        setTimeout(() => setProgress(""), 5000);
    };

    const assetsWithScores = useMemo(() => {
        return assets.map((asset) => ({
            ...asset,
            dipScore: calculateDipScore(asset),
            volumeRatio: asset.volumeMA20Day > 0 ? asset.volume24h / asset.volumeMA20Day : 1,
        }));
    }, [assets]);

    const filteredAssets = useMemo(() => {
        let filtered = assetsWithScores;

        if (filterType !== 'all') {
            filtered = filtered.filter((a) => a.type === filterType);
        }

        return filtered.sort((a, b) => {
            const aValue = a[sortConfig.key];
            const bValue = b[sortConfig.key];

            if (sortConfig.direction === 'asc') {
                return aValue > bValue ? 1 : -1;
            } else {
                return aValue < bValue ? 1 : -1;
            }
        });
    }, [assetsWithScores, filterType, sortConfig]);

    const getDipScoreColor = (score) => {
        if (score >= 70) return 'text-green-600 bg-green-50';
        if (score >= 50) return 'text-emerald-600 bg-emerald-50';
        if (score >= 30) return 'text-yellow-600 bg-yellow-50';
        return 'text-gray-600 bg-gray-50';
    };

    const getRSIColor = (rsi) => {
        if (rsi < 25) return 'text-red-600 font-semibold';
        if (rsi < 30) return 'text-orange-600 font-semibold';
        if (rsi < 35) return 'text-yellow-600';
        return 'text-gray-600';
    };

    const getChangeColor = (change) => {
        return change < 0 ? 'text-red-400' : 'text-green-400';
    };

    return React.createElement("div", {
        className: "min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-6"
    },

        React.createElement("div", { className: "max-w-7xl mx-auto" },

            /* HEADER */
            React.createElement("div", { className: "mb-8" },
                React.createElement("div", { className: "flex items-center gap-3 mb-2" },
                    React.createElement("svg", { className: "w-8 h-8 text-emerald-400", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                        React.createElement("path", { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M13 17H3v-2h10v2zm0-4H3v-2h10v2zm0-4H3V7h10v2z" })
                    ),
                    React.createElement("h1", { className: "text-4xl font-bold text-white" }, "Dip Buy Scanner")
                ),
                React.createElement("p", { className: "text-slate-400 text-lg" }, "Real-time analysis of global indexes, stocks, ETFs, commodities, and crypto • Yahoo Finance (No API key needed!)")
            ),

            /* STATUS */
            React.createElement("div", { className: "mb-6 flex justify-between items-start" },
                React.createElement("div", null,
                    lastUpdate && React.createElement("p", { className: "text-slate-400" },
                        "📊 Last updated: ", React.createElement("span", { className: "text-slate-300" }, lastUpdate.toLocaleString('en-AU'))
                    ),
                    progress && React.createElement("p", { className: "text-emerald-400 font-semibold mt-1" }, progress)
                ),
                React.createElement("button", {
                    onClick: handleUpdate,
                    disabled: loading,
                    className: `flex items-center gap-2 px-6 py-3 rounded-lg font-medium transition-all ${
                        loading
                            ? 'bg-slate-600 text-slate-300 cursor-wait'
                            : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                    }`
                },
                    loading ? React.createElement("span", { className: "animate-spin" }, "⟳") : React.createElement("span", null, "🔄"),
                    loading ? "Updating..." : "Update Data"
                )
            ),

            /* ADD CUSTOM TICKER */
            React.createElement("div", { className: "mb-6 p-4 bg-slate-800/50 border border-slate-700 rounded-lg" },
                React.createElement("div", { className: "flex gap-3 flex-wrap items-end" },
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Ticker Symbol"),
                        React.createElement("input", {
                            type: "text",
                            value: newTickerInput,
                            onChange: (e) => setNewTickerInput(e.target.value.toUpperCase()),
                            onKeyPress: (e) => e.key === 'Enter' && handleAddTicker(),
                            placeholder: "e.g., TSLA",
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500 w-28"
                        })
                    ),
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Label (Optional)"),
                        React.createElement("input", {
                            type: "text",
                            value: newTickerName,
                            onChange: (e) => setNewTickerName(e.target.value),
                            onKeyPress: (e) => e.key === 'Enter' && handleAddTicker(),
                            placeholder: "e.g., My Dividend Stock",
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500 w-48"
                        })
                    ),
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Type"),
                        React.createElement("select", {
                            value: newTickerType,
                            onChange: (e) => setNewTickerType(e.target.value),
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500"
                        },
                            React.createElement("option", { value: "stock" }, "Stock"),
                            React.createElement("option", { value: "etf" }, "ETF"),
                            React.createElement("option", { value: "commodity" }, "Commodity"),
                            React.createElement("option", { value: "leveraged" }, "Leveraged"),
                            React.createElement("option", { value: "index" }, "Index"),
                            React.createElement("option", { value: "crypto" }, "Crypto")
                        )
                    ),
                    React.createElement("button", {
                        onClick: handleAddTicker,
                        className: "px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-medium transition-all"
                    }, "+ Add Ticker")
                ),
                React.createElement("div", { className: "mt-4 flex flex-wrap gap-2" },
                    customTickers.length > 0 && React.createElement("div", null,
                        React.createElement("p", { className: "text-sm text-slate-400 mb-2" }, `Custom Tickers (${customTickers.length}):`),
                        customTickers.map((ticker) =>
                            React.createElement("span", {
                                key: ticker.symbol,
                                className: "inline-flex items-center gap-2 px-3 py-1 bg-blue-900/50 border border-blue-700 text-blue-300 rounded-full text-sm"
                            },
                                React.createElement("div", null,
                                    React.createElement("span", { className: "font-bold" }, ticker.symbol),
                                    ticker.readableName !== ticker.symbol && React.createElement("span", { className: "text-blue-200 text-xs ml-1" }, `(${ticker.readableName})`)
                                ),
                                React.createElement("button", {
                                    onClick: () => handleRemoveTicker(ticker.symbol),
                                    className: "ml-1 font-bold hover:text-blue-100 cursor-pointer"
                                }, "×")
                            )
                        )
                    )
                )
            ),

            /* FILTERS */
            React.createElement("div", { className: "mb-6 flex gap-2 flex-wrap" },
                ['all', 'index', 'stock', 'etf', 'commodity', 'leveraged', 'crypto'].map((type) =>
                    React.createElement("button", {
                        key: type,
                        onClick: () => setFilterType(type),
                        className: `px-4 py-2 rounded-lg font-medium transition-all ${
                            filterType === type
                                ? 'bg-emerald-500 text-white'
                                : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                        }`
                    },
                        type === 'all' ? 'All Assets' : type.charAt(0).toUpperCase() + type.slice(1) + 's'
                    )
                )
            ),

            /* TABLE */
            filteredAssets.length > 0 ? React.createElement("div", { className: "overflow-x-auto rounded-lg border border-slate-700 bg-slate-800/50 backdrop-blur" },
                React.createElement("table", { className: "w-full text-sm" },
                    React.createElement("thead", null,
                        React.createElement("tr", { className: "border-b border-slate-700 bg-slate-800" },
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold w-12" }, "#"),
                            React.createElement("th", { className: "px-4 py-3 text-left text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'symbol', direction: 'desc' }) }, "Ticker"),
                            React.createElement("th", { className: "px-4 py-3 text-left text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'readableName', direction: 'desc' }) }, "Name"),
                            React.createElement("th", { className: "px-4 py-3 text-right text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'currentPrice', direction: 'desc' }) }, "Price"),
                            React.createElement("th", { className: "px-4 py-3 text-right text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'priceChange24h', direction: 'asc' }) }, "24h Change"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'rsi', direction: 'asc' }) }, "RSI"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold" }, "Vol Signal"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'dipScore', direction: 'desc' }) }, "Dip Score")
                        )
                    ),
                    React.createElement("tbody", null,
                        filteredAssets.map((asset, index) =>
                            React.createElement("tr", {
                                key: asset.id,
                                className: "border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors"
                            },
                                React.createElement("td", { className: "px-4 py-3 text-center text-slate-500 font-semibold w-12" },
                                    index + 1
                                ),
                                React.createElement("td", { className: "px-4 py-3 font-semibold text-white" },
                                    asset.symbol
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-slate-300" },
                                    asset.readableName || asset.name
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-right text-white font-mono" },
                                    "$" + asset.currentPrice.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 2 })
                                ),
                                React.createElement("td", { className: `px-4 py-3 text-right font-mono ${getChangeColor(asset.priceChange24h)}` },
                                    (asset.priceChange24h > 0 ? '+' : '') + asset.priceChange24h.toFixed(2) + "%"
                                ),
                                React.createElement("td", { className: `px-4 py-3 text-center font-mono ${getRSIColor(asset.rsi)}` },
                                    asset.rsi.toFixed(0)
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-center font-mono text-slate-300" },
                                    asset.volumeRatio.toFixed(2) + "x"
                                ),
                                React.createElement("td", { className: "px-4 py-3" },
                                    React.createElement("div", { className: `rounded-lg px-3 py-2 text-center font-bold font-mono ${getDipScoreColor(asset.dipScore)}` },
                                        Math.round(asset.dipScore) + "/100"
                                    )
                                )
                            )
                        )
                    )
                )
            ) : React.createElement("div", { className: "text-center py-12 bg-slate-800/50 rounded-lg border border-slate-700" },
                React.createElement("p", { className: "text-slate-400 mb-4" }, "No data loaded yet. Click 'Update Data' to fetch live market information.")
            ),

            /* INFO BOX */
            React.createElement("div", { className: "mt-8 bg-slate-700/50 border border-slate-600 rounded-lg p-4" },
                React.createElement("div", { className: "text-sm text-slate-300" },
                    React.createElement("strong", null, "✅ Yahoo Finance Integration: "),
                    "No API key required! Supports real index tickers (^GSPC, ^NDX, ^N225, ^HSI, etc.), all stocks, ETFs, commodities, leveraged ETFs, and cryptocurrencies. All data processed in your browser and cached locally."
                )
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById("root"))
    .render(React.createElement(DipBuyDashboard));
</script>

</body>
</html>
