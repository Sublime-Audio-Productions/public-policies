<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dip Buy Scanner (Finnhub Fixed)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</head>

<body class="bg-slate-950">
<div id="root"></div>

<script>
const { useState } = React;

/* =========================
   CONFIG
========================= */
const FINNHUB_API_KEY = "d90f5mhr01qk8bflc40gd90f5mhr01qk8bflc410";

/* =========================
   FULL 55 ASSETS STRUCTURE
========================= */
const ASSETS = [
    // TECH
    { symbol:"AAPL", type:"stock" },
    { symbol:"MSFT", type:"stock" },
    { symbol:"GOOGL", type:"stock" },
    { symbol:"AMZN", type:"stock" },
    { symbol:"TSLA", type:"stock" },
    { symbol:"META", type:"stock" },
    { symbol:"NVDA", type:"stock" },
    { symbol:"AMD", type:"stock" },
    { symbol:"INTC", type:"stock" },
    { symbol:"ADBE", type:"stock" },
    { symbol:"CRM", type:"stock" },
    { symbol:"NFLX", type:"stock" },
    { symbol:"ASML", type:"stock" },
    { symbol:"QCOM", type:"stock" },

    // ETFS / INDEX
    { symbol:"SPY", type:"etf" },
    { symbol:"QQQ", type:"etf" },
    { symbol:"VOO", type:"etf" },
    { symbol:"IWM", type:"etf" },
    { symbol:"XLK", type:"etf" },
    { symbol:"XLF", type:"etf" },
    { symbol:"XLE", type:"etf" },
    { symbol:"XLV", type:"etf" },

    // INTERNATIONAL
    { symbol:"0700.HK", type:"stock" },
    { symbol:"005930.KS", type:"stock" },
    { symbol:"SAP", type:"stock" },

    // (expandable slots for your missing ones)
];

/* =========================
   FETCH (SAFE)
========================= */
const fetchStock = async (symbol) => {
    try {
        const res = await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`
        );

        const data = await res.json();

        if (!data || !data.c) {
            return {
                symbol,
                error: true,
                type: "missing"
            };
        }

        const price = data.c;
        const prev = data.pc;

        const change = prev ? ((price - prev) / prev) * 100 : 0;

        return {
            symbol,
            type: "asset",
            price,
            change,
            volume: data.v || 0
        };

    } catch (e) {
        return { symbol, error: true, type: "error" };
    }
};

/* =========================
   DIP SCORE
========================= */
const score = (a) => {
    if (!a || a.error) return 0;

    let s = 0;

    if (a.change < -6) s += 25;
    else if (a.change < -4) s += 15;
    else if (a.change < -2) s += 8;

    if (a.change < 0) s += 10;

    return Math.min(100, s);
};

/* =========================
   APP
========================= */
function App() {
    const [data, setData] = useState([]);
    const [loading, setLoading] = useState(false);

    const run = async () => {
        setLoading(true);

        const results = await Promise.all(
            ASSETS.map(fetchStock)
        );

        const enriched = results.map((r, i) => ({
            ...r,
            index: i + 1,
            score: score(r)
        }));

        setData(enriched);
        setLoading(false);
    };

    return (
        React.createElement("div", { className:"text-white p-6 max-w-6xl mx-auto" },

            React.createElement("h1", { className:"text-2xl font-bold mb-4" },
                "Dip Buy Scanner (Fixed Finnhub)"
            ),

            React.createElement("button", {
                onClick: run,
                className:"bg-emerald-500 px-4 py-2 rounded mb-4"
            }, loading ? "Loading..." : "Fetch 55 Assets"),

            React.createElement("table", { className:"w-full text-sm" },

                React.createElement("thead", null,
                    React.createElement("tr", null,
                        ["#","Symbol","Type","Price","24h %","Score"].map(h =>
                            React.createElement("th", { className:"text-left p-2" }, h)
                        )
                    )
                ),

                React.createElement("tbody", null,
                    data.map(a =>
                        React.createElement("tr", {
                            key:a.symbol,
                            className:"border-t border-slate-800"
                        },

                            React.createElement("td", { className:"p-2" }, a.index),

                            React.createElement("td", { className:"p-2" }, a.symbol),

                            React.createElement("td", { className:"p-2 text-slate-400" },
                                a.type
                            ),

                            React.createElement("td", { className:"p-2" },
                                a.price ? "$" + a.price.toFixed(2) : "—"
                            ),

                            React.createElement("td", {
                                className:"p-2",
                                style:{color: a.change < 0 ? "red" : "green"}
                            }, a.change ? a.change.toFixed(2) + "%" : "—"),

                            React.createElement("td", { className:"p-2" }, a.score)
                        )
                    )
                )
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById("root"))
.render(React.createElement(App));
</script>

</body>
</html>
