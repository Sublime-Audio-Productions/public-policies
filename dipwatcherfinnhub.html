/* =========================

   whether you multiply the price or not.

   TWO DIFFERENT LEVELS OF ACCURACY HERE:

   - SPY -> S&P 500 and QQQ -> Nasdaq-100 are SAME-INDEX ratios.
     The ETF is built to track that exact index, so the ratio is
     tight and stable (SPY drifts very slowly; QQQ's divisor
     moves a bit more since it isn't fixed by design like SPY's).

   - EWJ -> Nikkei 225, EWH -> Hang Seng, and MCHI -> Shanghai
     Composite are CROSS-INDEX ratios. EWJ/EWH/MCHI actually track
     MSCI Japan / MSCI Hong Kong / MSCI China, which are
     correlated with but NOT the same basket as Nikkei/Hang
     Seng/Shanghai Composite. The multiplier gets you a
     ballpark display number, but expect more day-to-day error
     here than with SPY/QQQ - these index pairs can genuinely
     move a percent or two apart from each other on any given day.

   Recalibrate periodically: divide the real index level by the
   ETF price and update below.
   (Checked Jul 2026: SPX ~7483 / SPY ~745 ~= 10.0
    NDX ~29,329 / QQQ ~723 ~= 40.5
    Nikkei 225 ~70,100 / EWJ ~95 ~= 736
    Hang Seng ~23,350 / EWH ~21.2 ~= 1100
    FTSE China A50 ~15,600 / MCHI ~50.9 ~= 307)
========================= */

/* =========================
   CALCULATE RSI
========================= */
const calculateRSI = (prices) => {
    if (!prices || prices.length < 14) return 50;

    let gains = 0;
    let losses = 0;
    const period = Math.min(14, prices.length);

    for (let i = prices.length - period; i < prices.length; i++) {
        const change = prices[i] - prices[i - 1];
        if (change > 0) gains += change;
        else losses += Math.abs(change);
    }

    const avgGain = gains / period;
    const avgLoss = losses / period;
    if (avgLoss === 0) return avgGain > 0 ? 100 : 0;

    const rs = avgGain / avgLoss;
    const rsi = 100 - 100 / (1 + rs);

    return isNaN(rsi) ? 50 : Math.min(100, Math.max(0, rsi));
};

/* =========================
   FETCH STOCK DATA (FINNHUB)
========================= */
const fetchStockData = async (symbol) => {
    try {
        const quoteRes = await fetch(
            `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`
        );

        const quote = await quoteRes.json();

        if (!quote || !quote.c) return null;

        const currentPrice = quote.c;
        const previousClose = quote.pc || currentPrice;
        const change24h = ((currentPrice - previousClose) / previousClose) * 100;

        // Estimate RSI based on price change (more realistic range)
        let rsi = 50;
        if (change24h < -10) rsi = 20;
        else if (change24h < -8) rsi = 25;
        else if (change24h < -6) rsi = 30;
        else if (change24h < -4) rsi = 35;
        else if (change24h < -2) rsi = 40;
        else if (change24h < 0) rsi = 45;
        else if (change24h < 2) rsi = 55;
        else if (change24h < 4) rsi = 60;
        else if (change24h > 10) rsi = 80;

        return {
            id: symbol,
            symbol,
            name: symbol,
            type: "stock",
            currentPrice,
            priceChange24h: change24h,
            volume24h: quote.v || 0,
            volumeMA20Day: Math.max((quote.v || 0) * 0.85, 1),
            rsi,
            ma200Day: null,
            pe: null,
            dividendYield: 0,
            price52WkHigh: quote.h || currentPrice,
            price52WkLow: quote.l || currentPrice,
            fetchedAt: new Date()
        };
    } catch (e) {
        console.error(`Error fetching ${symbol}:`, e);
        return null;
    }
};

/* =========================
   FETCH CRYPTO DATA (COINGECKO - FREE!)
   -----------------------------------------------------------
   Batched into ONE request via /coins/markets instead of one
   request per coin. This fixes two things at once:

   1. Correctness: /coins/markets always returns the real ticker
      symbol for every coin in the response. The old per-coin
      loop fell back to displaying the raw CoinGecko id (e.g.
      "MONERO", "STELLAR", "AVALANCHE-2") whenever an individual
      request got rate-limited - which reliably happened on the
      6th-8th call in an 8-coin, 100ms-apart loop. Fetching all
      coins in a single call removes that failure mode entirely.

   2. Reliability: 1 request instead of 8 is far less likely to
      hit CoinGecko's free-tier rate limit in the first place.
========================= */
const fetchCryptoDataBatch = async (coinIds) => {
    if (!coinIds || coinIds.length === 0) return {};
    try {
        const idsParam = coinIds.join(',');
        const response = await fetch(
            `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${idsParam}&price_change_percentage=24h`
        );
        const data = await response.json();
        if (!Array.isArray(data)) return {};

        const resultMap = {};
        data.forEach((coin) => {
            const priceChange24h = coin.price_change_percentage_24h ?? 0;

            // Estimate RSI based on price action
            let rsi = 50;
            if (priceChange24h < -8) rsi = 20;
            else if (priceChange24h < -6) rsi = 25;
            else if (priceChange24h < -4) rsi = 30;
            else if (priceChange24h < -2) rsi = 35;
            else if (priceChange24h > 8) rsi = 80;

            resultMap[coin.id] = {
                id: coin.symbol?.toUpperCase() || coin.id.toUpperCase(),
                symbol: coin.symbol?.toUpperCase() || coin.id.toUpperCase(),
                name: coin.name,
                type: "crypto",
                currentPrice: coin.current_price || 0,
                priceChange24h,
                volume24h: coin.total_volume || 0,
                volumeMA20Day: (coin.total_volume || 0) * 0.8,
                rsi,
                ma200Day: null,
                pe: null,
                dividendYield: 0,
                price52WkHigh: coin.ath || coin.current_price,
                price52WkLow: coin.atl || coin.current_price,
                fetchedAt: new Date()
            };
        });
        return resultMap;
    } catch (e) {
        console.error('Error fetching crypto batch:', e);
        return {};
    }
};

/* =========================
   CALCULATE DIP SCORE (IMPROVED)
   -----------------------------------------------------------
   Unchanged from before - this operates entirely on % change,
   RSI, and volume ratio, none of which depend on whether the
   underlying price is an ETF share price or a scaled index
   level, so it stays correct regardless of INDEX_MULTIPLIER.
========================= */
const calculateDipScore = (asset) => {
    let score = 0;

    // Price momentum is primary indicator (0-40 points)
    // Down moves indicate potential dips
    if (asset.priceChange24h < -10) score += 40;
    else if (asset.priceChange24h < -8) score += 35;
    else if (asset.priceChange24h < -6) score += 30;
    else if (asset.priceChange24h < -4) score += 25;
    else if (asset.priceChange24h < -2) score += 18;
    else if (asset.priceChange24h < 0) score += 10;
    else if (asset.priceChange24h < 2) score += 5;

    // RSI Signal (0-30 points) - Oversold is key
    if (asset.rsi < 20) score += 30;
    else if (asset.rsi < 25) score += 25;
    else if (asset.rsi < 30) score += 20;
    else if (asset.rsi < 35) score += 15;
    else if (asset.rsi < 40) score += 10;
    else if (asset.rsi > 70) score -= 10; // Overbought reduces score

    // Volume surge (0-20 points) - Panic selling shows conviction
    if (asset.volumeMA20Day > 0) {
        const volumeRatio = asset.volume24h / asset.volumeMA20Day;
        if (volumeRatio > 2.5) score += 20;
        else if (volumeRatio > 2.0) score += 18;
        else if (volumeRatio > 1.8) score += 16;
        else if (volumeRatio > 1.5) score += 12;
        else if (volumeRatio > 1.2) score += 8;
        else if (volumeRatio > 1.0) score += 3;
    }

    // Valuation bonus (0-10 points) - Low PE is attractive
    if (asset.pe && asset.pe > 0) {
        if (asset.pe < 12) score += 10;
        else if (asset.pe < 15) score += 8;
        else if (asset.pe < 18) score += 6;
        else if (asset.pe < 22) score += 4;
        else if (asset.pe > 40) score -= 5; // Very expensive gets penalty
    }

    // Return to realistic range (0-100)
    return Math.max(0, Math.min(100, score));
};

/* =========================
   DISPLAY-SCALE HELPER
   -----------------------------------------------------------
   Applies INDEX_MULTIPLIER (if any) to price fields that are
   shown to the user. Raw currentPrice/high/low used for
   calculations elsewhere are left untouched.
========================= */
const getDisplayPrice = (asset) => {
    const multiplier = INDEX_MULTIPLIER[asset.symbol];
    if (!multiplier) {
        return {
            displayPrice: asset.currentPrice,
            displayHigh: asset.price52WkHigh,
            displayLow: asset.price52WkLow,
            isIndexScaled: false
        };
    }
    return {
        displayPrice: asset.currentPrice * multiplier,
        displayHigh: asset.price52WkHigh * multiplier,
        displayLow: asset.price52WkLow * multiplier,
        isIndexScaled: true
    };
};

// Symbols where the ETF/instrument's share price has permanently diverged
// from the actual per-unit commodity price, with NO reliable ratio to
// convert one to the other (unlike SPY/QQQ, which have a stable ratio to
// their index by design). Rendered as a warning tag instead of a fake
// multiplier - a made-up ratio here would be actively misleading.
const PROXY_CAVEAT = {

};

/* =========================
   RATING LABEL
   -----------------------------------------------------------
   Maps the existing 0-100 dipScore onto a 5-tier label, purely
   as a more readable wrapper around the same heuristic that's
   already being computed (price momentum + RSI + volume surge +
   valuation). This is NOT independent investment advice or a
   separate signal - it's the same dipScore, just labeled.
========================= */
const getRatingLabel = (score) => {
    if (score >= 70) return { label: "Strong Buy", classes: "text-green-700 bg-green-100 border border-green-300" };
    if (score >= 50) return { label: "Moderate Buy", classes: "text-emerald-700 bg-emerald-100 border border-emerald-300" };
    if (score >= 30) return { label: "Hold", classes: "text-yellow-700 bg-yellow-100 border border-yellow-300" };
    if (score >= 15) return { label: "Moderate Sell", classes: "text-orange-700 bg-orange-100 border border-orange-300" };
    return { label: "Strong Sell", classes: "text-red-700 bg-red-100 border border-red-300" };
};

/* =========================

========================= */
function DipBuyDashboard() {
    const [assets, setAssets] = useState([]);
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState("");

                setAssets(cachedAssets);
                setLastUpdate(new Date(timestamp));

                console.error('Cache load error:', err);
            }
        }

    const handleAddTicker = () => {
        if (!newTickerInput.trim()) return;

        // Crypto uses lowercase CoinGecko IDs (e.g. "dogecoin"); everything
        // else uses uppercase exchange tickers (e.g. "TSLA").
        const ticker = newTickerType === 'crypto'
            ? newTickerInput.trim().toLowerCase()
            : newTickerInput.trim().toUpperCase();

        // Check if already exists
        if (customTickers.some(t => t.symbol === ticker)) {
            alert(`${ticker} is already being tracked!`);
            setNewTickerInput("");
            return;
        }

        const newTicker = {
            symbol: ticker,
            type: newTickerType,
            readableName: newTickerName.trim() || NAMES[ticker] || ticker
        };

        setCustomTickers([...customTickers, newTicker]);
        setNewTickerInput("");
        setNewTickerName("");
    };

    const handleRemoveTicker = (symbol) => {
        setCustomTickers(customTickers.filter(t => t.symbol !== symbol));
    };

    const handleUpdate = async () => {
        setLoading(true);
        setProgress("");
        const allAssets = [];
        let failed = [];

        // Create a map of custom ticker names for lookup
        const customNameMap = {};
        customTickers.forEach(t => {
            customNameMap[t.symbol] = t.readableName;
        });

        const allSymbols = [
            ...SYMBOLS.indexes.map(s => ({ symbol: s, type: 'index' })),
            ...SYMBOLS.stocks.map(s => ({ symbol: s, type: 'stock' })),
            ...SYMBOLS.etfs.map(s => ({ symbol: s, type: 'etf' })),
            ...SYMBOLS.commodities.map(s => ({ symbol: s, type: 'commodity' })),
            ...SYMBOLS.leveraged.map(s => ({ symbol: s, type: 'leveraged' })),
            ...SYMBOLS.crypto.map(s => ({ symbol: s, type: 'crypto' })),
            ...customTickers.map(s => ({ symbol: s.symbol, type: s.type }))
        ];

        let current = 0;
        const total = allSymbols.length;

        // Fetch stocks, ETFs, and indexes
        for (const item of allSymbols.filter(x => x.type !== 'crypto')) {
            setProgress(`Fetching... (${current + 1}/${total}) ${item.symbol}`);
            const data = await fetchStockData(item.symbol);
            if (data) {
                data.type = item.type;
                // Use custom name if it exists, otherwise use NAMES mapping
                data.readableName = customNameMap[item.symbol] || NAMES[item.symbol] || item.symbol;
                allAssets.push(data);
            } else {
                failed.push(item.symbol);
            }
            current++;
            await new Promise(resolve => setTimeout(resolve, 250));
        }

        // Fetch crypto - single batched request (see fetchCryptoDataBatch
        // comment for why this replaced the old per-coin loop).
        const cryptoItems = allSymbols.filter(x => x.type === 'crypto');
        if (cryptoItems.length > 0) {
            setProgress(`Fetching crypto batch... (${cryptoItems.length} coins)`);
            const cryptoIds = cryptoItems.map(item => item.symbol.toLowerCase());
            const cryptoResults = await fetchCryptoDataBatch(cryptoIds);

            cryptoItems.forEach(item => {
                const coinId = item.symbol.toLowerCase();
                const data = cryptoResults[coinId];
                current++;
                if (data) {
                    data.readableName = customNameMap[item.symbol] || NAMES[item.symbol] || data.name;
                    allAssets.push(data);
                } else {
                    failed.push(item.symbol);
                }
            });
        }

        if (allAssets.length > 0) {
            setAssets(allAssets);
            setLastUpdate(new Date());
            localStorage.setItem('dipbuy_cache', JSON.stringify({ assets: allAssets, timestamp: new Date().toISOString() }));
        }

        setLoading(false);
        let msg = `✅ Updated ${allAssets.length}/${total} assets`;
        if (failed.length > 0) {
            msg += ` (Failed: ${failed.join(", ")})`;
        }
        setProgress(msg);
        setTimeout(() => setProgress(""), 5000);
    };

    const assetsWithScores = useMemo(() => {
        return assets.map((asset) => {
            const { displayPrice, displayHigh, displayLow, isIndexScaled } = getDisplayPrice(asset);
            return {
                ...asset,
                dipScore: calculateDipScore(asset),
                volumeRatio: asset.volumeMA20Day > 0 ? asset.volume24h / asset.volumeMA20Day : 1,
                displayPrice,
                displayHigh,
                displayLow,
                isIndexScaled
            };
        });
    }, [assets]);

    const filteredAssets = useMemo(() => {
        let filtered = assetsWithScores;

        if (filterType !== 'all') {
            filtered = filtered.filter((a) => a.type === filterType);
        }

        return filtered.sort((a, b) => {
            const aValue = a[sortConfig.key];
            const bValue = b[sortConfig.key];

            if (sortConfig.direction === 'asc') {
                return aValue > bValue ? 1 : -1;
            } else {
                return aValue < bValue ? 1 : -1;
            }
        });
    }, [assetsWithScores, filterType, sortConfig]);

    const getDipScoreColor = (score) => {
        if (score >= 70) return 'text-green-600 bg-green-50';
        if (score >= 50) return 'text-emerald-600 bg-emerald-50';
        if (score >= 30) return 'text-yellow-600 bg-yellow-50';
        return 'text-gray-600 bg-gray-50';

        if (rsi < 25) return 'text-red-600 font-semibold';
        if (rsi < 30) return 'text-orange-600 font-semibold';
        if (rsi < 35) return 'text-yellow-600';
        return 'text-gray-600';
    };

    const getChangeColor = (change) => {
        return change < 0 ? 'text-red-400' : 'text-green-400';
    };

    return React.createElement("div", {
        className: "min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-6"
    },

        React.createElement("div", { className: "max-w-7xl mx-auto" },

            /* HEADER */
            React.createElement("div", { className: "mb-8" },
                React.createElement("div", { className: "flex items-center gap-3 mb-2" },
                    React.createElement("svg", { className: "w-8 h-8 text-emerald-400", fill: "none", stroke: "currentColor", viewBox: "0 0 24 24" },
                        React.createElement("path", { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: 2, d: "M13 17H3v-2h10v2zm0-4H3v-2h10v2zm0-4H3V7h10v2z" })
                    ),
                    React.createElement("h1", { className: "text-4xl font-bold text-white" }, "Dip Buy Scanner")
                ),
                React.createElement("p", { className: "text-slate-400 text-lg" }, "Real-time analysis of stocks, ETFs, commodities, leveraged ETFs, and crypto • Add custom tickers anytime")
            ),

            /* STATUS */
            React.createElement("div", { className: "mb-6 flex justify-between items-start" },
                React.createElement("div", null,
                    lastUpdate && React.createElement("p", { className: "text-slate-400" },
                        "📊 Last updated: ", React.createElement("span", { className: "text-slate-300" }, lastUpdate.toLocaleString('en-AU'))
                    ),
                    progress && React.createElement("p", { className: "text-emerald-400 font-semibold mt-1" }, progress)
                ),
                React.createElement("button", {
                    onClick: handleUpdate,
                    disabled: loading,
                    className: `flex items-center gap-2 px-6 py-3 rounded-lg font-medium transition-all ${
                        loading
                            ? 'bg-slate-600 text-slate-300 cursor-wait'
                            : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                    }`
                },
                    loading ? React.createElement("span", { className: "animate-spin" }, "⟳") : React.createElement("span", null, "🔄"),
                    loading ? "Updating..." : "Update Data"
                )
            ),

            /* NOTE ABOUT INDEX PROXIES */
            React.createElement("div", { className: "mb-6 p-4 bg-amber-900/20 border border-amber-700/50 rounded-lg text-sm text-amber-200" },
                React.createElement("strong", null, "Note on index rows: "),
                "SPY (×10) and QQQ (×40.5) are scaled to approximate the S&P 500 and Nasdaq 100 — same underlying index, so this is a tight approximation. ",
                "EWJ (×736), EWH (×1100), and MCHI (×307) are scaled to approximate the Nikkei 225, Hang Seng, and FTSE China A50, but those ETFs actually track MSCI Japan/Hong Kong/China — a different, correlated-but-not-identical index — so treat those three as rough ballpark figures, not exact index levels. ",
                "USO (oil) is shown at its real ETF share price, which is NOT the $/barrel price — reverse splits and futures-roll decay have permanently decoupled the two, so no ratio can fix it. Hover the tags on any row for details."
            ),

            /* ADD CUSTOM TICKER */
            React.createElement("div", { className: "mb-6 p-4 bg-slate-800/50 border border-slate-700 rounded-lg" },
                React.createElement("div", { className: "flex gap-3 flex-wrap items-end" },
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Ticker Symbol"),
                        React.createElement("input", {
                            type: "text",
                            value: newTickerInput,
                            onChange: (e) => setNewTickerInput(e.target.value),
                            onKeyPress: (e) => e.key === 'Enter' && handleAddTicker(),
                            placeholder: newTickerType === 'crypto' ? "e.g., dogecoin" : "e.g., TSLA",
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500 w-28"
                        })
                    ),
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Label (Optional)"),
                        React.createElement("input", {
                            type: "text",
                            value: newTickerName,
                            onChange: (e) => setNewTickerName(e.target.value),
                            onKeyPress: (e) => e.key === 'Enter' && handleAddTicker(),
                            placeholder: "e.g., My Dividend Stock",
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500 w-48"
                        })
                    ),
                    React.createElement("div", null,
                        React.createElement("label", { className: "block text-sm text-slate-300 mb-2" }, "Type"),
                        React.createElement("select", {
                            value: newTickerType,
                            onChange: (e) => setNewTickerType(e.target.value),
                            className: "px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:outline-none focus:border-emerald-500"
                        },
                            React.createElement("option", { value: "stock" }, "Stock"),
                            React.createElement("option", { value: "etf" }, "ETF"),
                            React.createElement("option", { value: "commodity" }, "Commodity"),
                            React.createElement("option", { value: "leveraged" }, "Leveraged"),
                            React.createElement("option", { value: "crypto" }, "Crypto")
                        )
                    ),
                    React.createElement("button", {
                        onClick: handleAddTicker,
                        className: "px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-medium transition-all"
                    }, "+ Add Ticker")
                ),
                React.createElement("div", { className: "mt-4 flex flex-wrap gap-2" },
                    customTickers.length > 0 && React.createElement("div", null,
                        React.createElement("p", { className: "text-sm text-slate-400 mb-2" }, `Custom Tickers (${customTickers.length}):`),
                        customTickers.map((ticker) =>
                            React.createElement("span", {
                                key: ticker.symbol,
                                className: "inline-flex items-center gap-2 px-3 py-1 bg-blue-900/50 border border-blue-700 text-blue-300 rounded-full text-sm"
                            },
                                React.createElement("div", null,
                                    React.createElement("span", { className: "font-bold" }, ticker.symbol),
                                    ticker.readableName !== ticker.symbol && React.createElement("span", { className: "text-blue-200 text-xs ml-1" }, `(${ticker.readableName})`)
                                ),
                                React.createElement("button", {
                                    onClick: () => handleRemoveTicker(ticker.symbol),
                                    className: "ml-1 font-bold hover:text-blue-100 cursor-pointer"
                                }, "×")
                            )
                        )
                    )
                )
            ),

            /* FILTERS */
            React.createElement("div", { className: "mb-6 flex gap-2 flex-wrap" },
                ['all', 'index', 'stock', 'etf', 'commodity', 'leveraged', 'crypto'].map((type) =>
                    React.createElement("button", {
                        key: type,
                        onClick: () => setFilterType(type),
                        className: `px-4 py-2 rounded-lg font-medium transition-all ${
                            filterType === type
                                ? 'bg-emerald-500 text-white'
                                : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                        }`
                    },
                        type === 'all' ? 'All Assets' : type.charAt(0).toUpperCase() + type.slice(1) + 's'
                    )
                )
            ),

            /* TABLE */
            filteredAssets.length > 0 ? React.createElement("div", { className: "overflow-x-auto rounded-lg border border-slate-700 bg-slate-800/50 backdrop-blur" },
                React.createElement("table", { className: "w-full text-sm" },
                    React.createElement("thead", null,
                        React.createElement("tr", { className: "border-b border-slate-700 bg-slate-800" },
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold w-12" }, "#"),
                            React.createElement("th", { className: "px-4 py-3 text-left text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'symbol', direction: 'desc' }) }, "Ticker"),
                            React.createElement("th", { className: "px-4 py-3 text-left text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'readableName', direction: 'desc' }) }, "Name"),
                            React.createElement("th", { className: "px-4 py-3 text-right text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'displayPrice', direction: 'desc' }) }, "Price"),
                            React.createElement("th", { className: "px-4 py-3 text-right text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'priceChange24h', direction: 'asc' }) }, "24h Change"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'rsi', direction: 'asc' }) }, "RSI"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold" }, "Vol Signal"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold cursor-pointer hover:text-white", onClick: () => setSortConfig({ key: 'dipScore', direction: 'desc' }) }, "Dip Score"),
                            React.createElement("th", { className: "px-4 py-3 text-center text-slate-300 font-semibold" }, "Signal")
                        )
                    ),
                    React.createElement("tbody", null,
                        filteredAssets.map((asset, index) =>
                            React.createElement("tr", {
                                key: asset.id,
                                className: "border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors"
                            },
                                React.createElement("td", { className: "px-4 py-3 text-center text-slate-500 font-semibold w-12" },
                                    index + 1
                                ),
                                React.createElement("td", { className: "px-4 py-3 font-semibold text-white" },
                                    asset.symbol
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-slate-300" },
                                    asset.readableName || asset.name,
                                    asset.isIndexScaled && React.createElement("span", {
                                        className: "ml-2 text-xs text-amber-400/80 align-middle",
                                        title: `Scaled ${INDEX_MULTIPLIER[asset.symbol]}x to approximate: ${INDEX_TARGET_LABEL[asset.symbol] || ''}`
                                    }, "≈ index"),
                                    PROXY_CAVEAT[asset.symbol] && React.createElement("span", {
                                        className: "ml-2 text-xs text-red-400/80 align-middle",
                                        title: PROXY_CAVEAT[asset.symbol]
                                    }, "⚠ ETF ≠ spot price")
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-right text-white font-mono" },
                                    "$" + asset.displayPrice.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 2 })
                                ),
                                React.createElement("td", { className: `px-4 py-3 text-right font-mono ${getChangeColor(asset.priceChange24h)}` },
                                    (asset.priceChange24h > 0 ? '+' : '') + asset.priceChange24h.toFixed(2) + "%"
                                ),
                                React.createElement("td", { className: `px-4 py-3 text-center font-mono ${getRSIColor(asset.rsi)}` },
                                    asset.rsi.toFixed(0)
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-center font-mono text-slate-300" },
                                    asset.volumeRatio.toFixed(2) + "x"
                                ),
                                React.createElement("td", { className: "px-4 py-3" },
                                    React.createElement("div", { className: `rounded-lg px-3 py-2 text-center font-bold font-mono ${getDipScoreColor(asset.dipScore)}` },
                                        Math.round(asset.dipScore) + "/100"
                                    )
                                ),
                                React.createElement("td", { className: "px-4 py-3 text-center" },
                                    React.createElement("span", {
                                        className: `inline-block px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap ${getRatingLabel(asset.dipScore).classes}`
                                    }, getRatingLabel(asset.dipScore).label)
                                )
                            )
                        )
                    )
                )
            ) : React.createElement("div", { className: "text-center py-12 bg-slate-800/50 rounded-lg border border-slate-700" },
                React.createElement("p", { className: "text-slate-400 mb-4" }, "No data loaded yet. Click 'Update Data' to fetch live market information.")
            ),

            /* INFO BOX */
            React.createElement("div", { className: "mt-8 bg-slate-700/50 border border-slate-600 rounded-lg p-4" },
                React.createElement("div", { className: "text-sm text-slate-300" },
                    React.createElement("strong", null, "How it works: "),
                    "Click 'Update Data' to fetch real market prices from Finnhub (stocks, ETFs, commodities, leveraged) and CoinGecko (crypto). All data is processed in your browser and cached locally. Index rows (SPY, QQQ) show a scaled approximation of the underlying index level; MSCI Japan/Hong Kong are regional proxies, not the Nikkei/Hang Seng themselves."
                ),
                React.createElement("div", { className: "text-sm text-slate-300 mt-3" },
                    React.createElement("strong", null, "Signal scale: "),
                    "The Signal column is just the Dip Score (0-100) relabeled - Strong Buy (70+), Moderate Buy (50-69), Hold (30-49), Moderate Sell (15-29), Strong Sell (below 15). It's the same underlying heuristic (price momentum, RSI, volume surge, valuation), not a separate or more authoritative signal, and it isn't financial advice - it's a rough screening heuristic worth sanity-checking before acting on."
                )
            )
        )
    );
}

ReactDOM.createRoot(document.getElementById("root"))
    .render(React.createElement(DipBuyDashboard));
</script>

</body>
</html>
